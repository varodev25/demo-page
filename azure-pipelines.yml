trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  imageName: 'demo-page'


stages:
- stage: Build
  displayName: Build image

  jobs:
  - job: Build

    displayName: Build

    pool: local-agent
      


    steps:

    - task: Docker@2
      displayName: Build an image

      inputs:
        repository: $(imageName)
        command: build
        dockerfile: '**/Dockerfile'
        tags: $(tag)
